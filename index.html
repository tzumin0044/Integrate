<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠園 理貨系統入口網</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            top: -10%;
            right: -5%;
            width: 400px;
            height: 400px;
            background: #a78bfa;
            border-radius: 50%;
        }

        .shape-2 {
            bottom: -10%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: #818cf8;
            border-radius: 50%;
            animation-delay: -5s;
        }

        .shape-3 {
            top: 40%;
            left: 30%;
            width: 300px;
            height: 300px;
            background: #34d399;
            border-radius: 50%;
            animation-delay: -2s;
            opacity: 0.4;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(-20px) scale(1.05);
            }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #111827;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            animation: fadeIn 1s ease-out;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            body {
                padding: 1rem;
            }
        }

        .category-section {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .category-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f3f4f6;
        }

        .category-header i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .category-header h2 {
            font-size: 1.8rem;
            color: var(--text-main);
        }

        .module-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .module-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.2rem;
            padding-left: 0.5rem;
            border-left: 4px solid #e5e7eb;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.8rem;
            background: #ffffff;
            color: #4b5563;
            text-decoration: none;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            font-weight: 500;
            border: 1px solid #e5e7eb;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            color: var(--primary);
            border-color: var(--primary);
        }

        .link-btn.single-item {
            grid-column: 1 / -1;
            background: linear-gradient(to right, #ffffff, #f9fafb);
        }

        .link-btn i {
            font-size: 1.2rem;
            color: #9ca3af;
            transition: color 0.3s ease;
            width: 24px;
            text-align: center;
        }

        .link-btn:hover i {
            color: var(--primary);
        }

        .link-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .link-btn:hover::after {
            transform: translateX(100%);
        }

        /* Specific colors for specific categories if needed */
        .category-service .category-header i {
            color: var(--secondary);
        }

        .category-service .link-btn:hover {
            color: var(--secondary);
            border-color: var(--secondary);
        }

        .category-service .link-btn:hover i {
            color: var(--secondary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Minimal scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>

<body>
    <div class="bg-shape shape-1"></div>

    <script>

        document.querySelectorAll('a').forEach(function (link) {

</body>

</html>
